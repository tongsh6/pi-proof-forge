id: "ec-2026-017"
title: "始祖鸟硬核资质审核系统：动态问卷引擎支持7种运动类型"
time_range: "2024-01 ~ 2024-03"
context: >
  始祖鸟针对越野跑、登山、攀岩、攀冰、滑雪、徒步等高难度活动，
  需要在报名阶段对用户的运动经历进行资质审核，以控制活动参与风险。
  不同运动类型的问卷题目、选项、图片上传规则完全不同，
  且运营人员需要能够独立在后台配置问卷，无需每次改需求都发版。
  需要设计一套动态问卷引擎，并与现有活动报名系统打通。
role_scope: "Owner"
actions:
  - "设计四层问卷数据模型：t_qualification_questionnaire（问卷）→ t_qualification_questionnaire_question（题目）→ t_qualification_questionnaire_option（选项）→ t_qualification_questionnaire_answer（答题记录），支持单选/多选/图片上传三种题型"
  - "实现条件展示规则（displayRule）：图片上传题可配置在特定选项被选中时才显示（如：选了"近一年内越野跑完赛记录"才出现图片上传框），支持 1-1、1-2 等规则配置"
  - "实现互斥选项（exclusive=true）：如"无上述经验"选项，选中后自动取消其他选项，后端校验防绕过"
  - "为散客活动、团队活动分别实现问卷关联接口，支持一个问卷绑定一个活动（questionnaireCode → eventId），运营可通过后台管理界面独立配置"
  - "针对7种运动类型（越野跑/登山/攀岩/攀冰/滑雪/徒步/登山1.1）分别编写问卷配置 HTTP 脚本，支持运营按需发起请求配置"
  - "答题记录与报名流程打通：用户提交资质问卷后，触发 RECHECK（复审中）状态，运营后台可查看答题内容和上传图片进行人工审核"
results:
  - "7种运动类型的问卷上线，运营可在2小时内独立完成新活动的问卷配置和关联（上线前需2天开发周期）"
  - "问卷引擎复用于3个活动模块（散客/团队/门店主题），代码零重复"
  - "图片上传审核流程上线后，高风险活动（攀冰、登山）的资质不达标率下降约40%"
  - "条件展示规则使问卷页面动态化，用户填写步骤减少约30%，问卷完成率提升至85%"
stack:
  - "Java"
  - "Spring Boot"
  - "MySQL"
  - "阿里云 OSS（图片存储）"
  - "微信小程序"
artifacts:
  - "始祖鸟-硬核人员资质审核操作说明1.0.md"
  - "始祖鸟-硬核人员资质审核操作说明1.1.md"
  - "始祖鸟-硬核人员资质审核问卷-越野跑.http"
  - "始祖鸟-硬核人员资质审核问卷-登山.http"
  - "始祖鸟-硬核人员资质审核问卷-攀岩.http"
  - "始祖鸟-硬核人员资质审核问卷-攀冰.http"
  - "始祖鸟-硬核人员资质审核问卷-滑雪.http"
tags:
  - "动态表单"
  - "规则引擎"
  - "内容配置化"
  - "审核系统"
interview_hooks:
  - "动态问卷的条件展示规则是如何设计的？前后端如何保证规则一致性防止绕过？"
  - "问卷题目和选项都是动态的，如何保证答题历史数据在问卷修改后不失效？"
  - "互斥选项（exclusive）的前端交互和后端校验是如何双重保障的？"
  - "为什么选择一个问卷对应一个活动的设计？而不是一套通用问卷？"
