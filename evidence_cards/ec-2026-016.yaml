id: "ec-2026-016"
title: "始祖鸟门店租赁登记系统：线下/邮寄双路径订单全流程"
time_range: "2024-05 ~ 2024-07"
context: >
  始祖鸟门店需要为到店会员提供户外装备（上装/下装等）的现场租赁服务。
  原流程完全线下纸质操作，无法统计租赁数据、无法提醒逾期、无法管理装备库存。
  需要从零搭建一套独立微服务（store-rental-management），
  实现用户租赁登记、核销、归还（线下/邮寄）的全生命周期数字化管理，
  以及导购端扫码核销和异常处理能力。
role_scope: "Owner"
actions:
  - "设计7种订单状态机：已登记→租赁中→(回寄中→)已完成，以及异常处理中/异常结束/已取消/超时关闭，覆盖线下归还和顺丰邮寄归还两条路径"
  - "设计核心表结构：t_store_rental_order（租赁订单）、t_store_rental_order_operation（操作记录）、t_store_rental_promotional_info（门店推广信息），添加4个查询索引"
  - "通过 ConfigManager 全局配置（key: arcteryx.store.rental.config.global）管理多门店的装备列表、积分单价、订单周期额度、超时时间、逾期提醒时间，支持运行时热更新"
  - "实现小程序太阳码推广入口：运营生成门店专属小程序码，用户扫码进入租赁登记页；订单创建时校验积分、用户限额、门店服务范围"
  - "导购端实现：手机号匹配导购门店权限、扫用户订单二维码核销、快递单号模糊搜索归还登记、异常关单（损坏/丢失/逾期）处理"
  - "xxl-job 定时任务链：订单超时关闭任务（超时1440分钟）、逾期前提醒任务、逾期后提醒任务；短信/微信订阅消息双渠道通知"
results:
  - "门店租赁订单管理完全数字化，日均订单操作量约50单，运营效率提升约3倍"
  - "逾期率通过提醒机制降至<8%（原线下无提醒时约25%）"
  - "顺丰邮寄归还路径打通，约30%的用户选择邮寄归还，减少到店压力"
  - "多门店配置隔离，单门店新增/下线不影响其他门店，配置变更平均生效时间<1分钟"
  - "导购端扫码核销覆盖100%的租赁登记场景，消除纸质记录"
stack:
  - "Java"
  - "Spring Boot"
  - "MySQL"
  - "Redis"
  - "xxl-job"
  - "顺丰快递 API"
  - "微信小程序（用户端 + 导购端）"
  - "Nacos"
artifacts:
  - "门店租赁登记/开发方案.md"
  - "门店租赁登记/术语表.md"
tags:
  - "状态机"
  - "线下核销"
  - "物流对接"
  - "多角色系统"
  - "配置中心"
interview_hooks:
  - "线下核销和邮寄归还两条路径在状态机上是如何分叉的？中间状态如何处理异常？"
  - "多门店的配置管理是如何设计的？如果某个门店需要特殊的逾期时间怎么处理？"
  - "导购的门店权限是怎么绑定的？如果导购调岗到另一个门店怎么处理？"
  - "订单超时关闭任务和逾期任务如何避免并发冲突？同一个订单两个任务同时触发会怎样？"
