id: "ec-2026-011"
title: "亚玛芬运动中心微服务平台从零搭建"
time_range: "2024-06 ~ 2025-01"
context: "亚玛芬多品牌（始祖鸟、萨洛蒙、威尔胜等）业务碎片化，各品牌活动报名、课程预约、门店服务独立开发，重复造轮子、维护成本高；需要一套统一的运动中心微服务平台支撑所有品牌快速上线新业务"
role_scope: "Owner"
actions:
  - "主导系统架构设计，划分12个微服务边界（内容服务/活动服务/支付服务/黑白名单服务/留资服务/消息服务/合成内容服务/引流服务/open-api服务/用户服务/nacos/xxl-job），输出应用通信图、数据模型图、部署图等架构文档"
  - "设计多租户架构支撑多品牌隔离，通过 JPA DAO 改造与 MyBatis 拦截器实现租户隔离"
  - "建立 BFF 层适配微信小程序、PC、后台管理等多端差异化数据展示需求"
  - "制定基于 Nacos 的服务注册发现与配置管理方案，统一微服务通信协议（HTTP/REST + Spring Boot）"
  - "建立发布策略：蓝绿发布、金丝雀发布、功能开关发布三种模式，支持零停机上线"
results:
  - "平台支撑始祖鸟、萨洛蒙、FILA Golf、Kolon 等多品牌业务，单品牌新功能上线周期从数周缩短至数天"
  - "统一了活动报名、课程预约、门店服务等核心流程，消除跨品牌重复开发"
stack:
  - "Java"
  - "Spring Boot"
  - "Nacos"
  - "MySQL"
  - "Redis"
  - "xxl-job"
  - "微信小程序"
artifacts:
  - "微服务应用通信图-1.mdj"
  - "运动中心数据模型图-1.mdj"
  - "运动中心系统架构图-1.mdj"
  - "运动中心微服务概述.pdf"
  - "Amer Architecture Design Steps 0619.pptx"
  - "技术组件清单.xlsx"
tags:
  - "架构"
  - "微服务"
  - "多租户"
  - "平台化"
  - "交付治理"
interview_hooks:
  - "为什么选择12个微服务而不是更少或更多？边界是怎么划的？"
  - "多租户方案中 MyBatis 拦截器和 JPA 改造各自适用什么场景？"
  - "BFF 层的边界怎么定？哪些逻辑放 BFF，哪些放后端服务？"
