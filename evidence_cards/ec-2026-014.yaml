id: "ec-2026-014"
title: "亚玛芬冰雪集合店多服务类型平台：储物/邮寄/租赁/定型全链路"
time_range: "2021-09 ~ 2022-06"
context: >
  亚玛芬运动（Amer Sports）在上海开设冰雪集合店，同时服务始祖鸟（Arc'teryx）、
  萨洛蒙（Salomon）、阿托米克（Atomic）等多品牌会员。
  门店需要线上化管理6类冰雪服务：专享储物柜租赁、雪具邮寄（顺丰对接）、
  雪具高端租赁、雪鞋定型、雪具保养、试滑体验。
  同时需要接入两套支付体系：收钱吧小程序支付（RMB）+ 始祖鸟CRM积分额度。
role_scope: "Owner"
actions:
  - "设计多服务类型统一订单模型，通过 ServiceType 枚举（邮寄雪具/专享储物/雪鞋定型）和 RentType 枚举（日租/月租/年租）支撑差异化业务流程"
  - "对接顺丰快递API，支持家到店（用户付费）/店到店/店到家（始祖鸟付费）三种邮寄路径，实现快递单生成、物流状态跟踪"
  - "接入收钱吧小程序支付 API（V1.6.2），实现在线支付+退款全链路；同时对接始祖鸟 CRM 积分额度接口，支持会员权益抵扣"
  - "设计储物柜管理模型：LockerRentState（使用中/空闲/不可用）+ LockerSize（大柜/小柜），实现柜位可视化分配与实时状态同步"
  - "构建逾期提醒通知体系：xxl-job 定时任务驱动3类短信（逾期前提醒/逾期后提醒/逾期寄回通知），模板通过消息配置中心统一管理"
  - "搭建多品牌小程序入口，每个品牌独立 appid/appKey，通过配置中心切换，支持 AmerSports/Atomic/Salomon 三端"
  - "实现物资管理模块：储物柜和雪具的库存状态实时跟踪，支持运营后台可视化管理"
results:
  - "平台上线后承载冰雪季峰值日均服务单量超200单，涵盖储物、邮寄、租赁3类主要服务"
  - "顺丰对接稳定运行，雪具邮寄物流单创建成功率>99.5%，物流状态同步延迟<2分钟"
  - "储物柜使用率在旺季达到90%+，逾期率通过提醒机制从初期的15%降至<5%"
  - "多品牌小程序在同一套代码下稳定运行，新增品牌接入成本降低约70%"
stack:
  - "Java"
  - "Spring Boot"
  - "MySQL"
  - "Redis"
  - "xxl-job"
  - "顺丰快递 API"
  - "收钱吧小程序支付 API"
  - "始祖鸟 CRM API（积分额度）"
  - "微信小程序（多appid）"
  - "阿里云 OSS"
artifacts:
  - "需求分析-冰雪服务.md"
  - "冰雪服务.md"
  - "冰雪服务发布.md"
  - "活动发布.md"
  - "收钱吧移动支付API对接最佳实践(小程序支付).V1.6.2.pdf"
tags:
  - "多品牌平台"
  - "第三方支付"
  - "物流对接"
  - "物资管理"
  - "多租户"
interview_hooks:
  - "多品牌在同一套代码下如何隔离配置和数据？如何保证 A 品牌会员看不到 B 品牌数据？"
  - "收钱吧和 CRM 积分两套支付体系是如何统一管理订单状态的？退款时如何分别处理？"
  - "顺丰对接时三种邮寄路径（家到店/店到店/店到家）的付款方配置是如何管理的？"
  - "储物柜逾期处理链路：从超时检测到顺丰寄回，整个自动化流程是怎么设计的？"
