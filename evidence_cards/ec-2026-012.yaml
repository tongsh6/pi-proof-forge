id: "ec-2026-012"
title: "始祖鸟之路：会员专属户外活动全链路系统设计"
time_range: "2025-01 ~ 2025-06"
context: "始祖鸟品牌联合松赞发起会员专属户外活动（4~5条精品路线），需支撑会员身份识别、线路配置、报名审核、向导带队核销、活动后反馈的全链路运营闭环；要求在不破坏现有通用能力的基础上做定制化迭代，同时支持用户端/向导端/管理端三端协作"
role_scope: "Owner"
actions:
  - "在现有门店主题活动模块（StoreThemedActivities）基础上设计扩展方案，新增 BaseRouteEntity 路线表实现路线与活动解耦，一条路线可派生多个子活动"
  - "设计向导机制：引入 BaseGuideEntity，复用 StoreThemedActivitiesWriteOffStaffRef 表，通过 staffType=GUIDE 字段区分向导与普通核销人，避免新增表的维护成本"
  - "设计活动日历查询接口，支持日历打点统计活动数及按日期查子活动，引导用户通过日历选择活动"
  - "在后台审核列表引入历史 NoShow 次数、是否白名单等辅助字段，支持人工辅助判断"
  - "设计向导端小程序权限控制：仅 staffType=GUIDE 身份可看到关联活动并扫码核销"
  - "输出详细改造点汇总（8 个模块，含新增/修改/复用决策）及完整的状态机定义"
results:
  - "完整交付向导机制、多路线支持、活动日历等核心模块，按期上线"
  - "通过复用现有表结构（不新增表）降低维护复杂度，扩展点向后兼容，未破坏已有散客/团队活动能力"
  - "三端（用户/向导/管理员）协作流程完整闭环，支持活动后数据导出与反馈汇总"
stack:
  - "Java"
  - "Spring Boot"
  - "MySQL"
  - "Redis"
  - "微信小程序"
  - "xxl-job"
artifacts:
  - "始祖鸟之路开发方案-1.0.md"
  - "始祖鸟之路二阶段开发方案-1.0.md"
  - "始祖鸟之路.sql"
tags:
  - "架构"
  - "活动报名"
  - "业务设计"
  - "交付"
  - "会员体系"
interview_hooks:
  - "为何选择复用 StoreThemedActivitiesWriteOffStaffRef 而不是新建向导表？"
  - "路线与活动解耦的数据模型设计思路是什么？有哪些权衡？"
  - "活动状态机有 8 个状态，如何保证状态流转的一致性？"
