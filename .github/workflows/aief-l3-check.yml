name: AIEF L3 Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  aief-l3-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AIEF L3 checker
        run: python3 tools/check_aief_l3.py --root . --base-dir AIEF
