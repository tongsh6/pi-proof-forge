<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PiProofForge GUI Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #071023;
      --bg-2: #101b35;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.14);
      --text: #eef4ff;
      --sub: #cbd5e1;
      --ok: #34d399;
      --warn: #fbbf24;
      --focus: #38bdf8;
      --chip: rgba(56, 189, 248, 0.16);
      --border: rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Noto Sans SC", "Space Grotesk", sans-serif;
      background:
        radial-gradient(1200px 760px at 110% -5%, rgba(56, 189, 248, 0.22), transparent 62%),
        radial-gradient(900px 600px at -20% 110%, rgba(59, 130, 246, 0.24), transparent 62%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 18px 30px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 2.8vw, 34px);
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--sub);
      font-size: 14px;
      max-width: 900px;
    }

    .hero-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status-chip {
      padding: 9px 14px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: #bae6fd;
      font-size: 13px;
      font-weight: 600;
    }

    .lang-switch {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .lang-switch button {
      border: 0;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.55);
      color: #dbeafe;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .lang-switch button.active {
      background: rgba(56, 189, 248, 0.28);
      color: #cffafe;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1.08fr;
      gap: 14px;
    }

    .stack {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 17px;
      font-family: "Space Grotesk", sans-serif;
    }

    .field { margin-bottom: 10px; }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #dbeafe;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 11px;
      background: rgba(2, 6, 23, 0.46);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.22);
    }

    textarea { min-height: 90px; resize: vertical; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .uploader {
      border: 1px dashed rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 8px;
      background: rgba(2, 6, 23, 0.38);
    }

    .uploader button {
      border: 1px solid rgba(56, 189, 248, 0.5);
      border-radius: 9px;
      background: rgba(56, 189, 248, 0.12);
      color: #c7f9ff;
      font-size: 12px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
    }

    .small {
      font-size: 12px;
      color: var(--sub);
    }

    .file-list {
      max-height: 140px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: rgba(2, 6, 23, 0.38);
      font-size: 12px;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
    }

    .file-item:last-child { border-bottom: 0; }

    .switch-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }

    .switch {
      display: flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 10px;
      background: rgba(2, 6, 23, 0.42);
      font-size: 12px;
      color: #dbeafe;
    }

    .switch input { width: auto; }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 700;
      color: #082f49;
      background: linear-gradient(135deg, #67e8f9, #38bdf8);
      cursor: pointer;
    }

    .cmd {
      margin-top: 8px;
      font-size: 12px;
      color: var(--sub);
      font-family: "Space Grotesk", monospace;
      word-break: break-all;
    }

    .steps {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .step {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 9px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 8px 9px;
      background: rgba(15, 23, 42, 0.45);
      font-size: 13px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.4);
      color: transparent;
      display: grid;
      place-items: center;
      font-size: 10px;
    }

    .step.running .dot {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.18);
    }

    .step.done .dot {
      border-color: var(--ok);
      color: var(--ok);
    }

    .meta { color: var(--sub); font-size: 11px; }

    .trace {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.48);
      height: 320px;
      overflow: auto;
      padding: 12px;
      margin-bottom: 12px;
      font-family: "Space Grotesk", monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .trace-line {
      margin-bottom: 6px;
      word-break: break-all;
    }

    .trace-line.system { color: #94a3b8; }
    .trace-line.action { color: #38bdf8; font-weight: 600; }
    .trace-line.success { color: #34d399; }
    .trace-line.error { color: #fbbf24; }
    .trace-line.thought { color: #a78bfa; font-style: italic; border-left: 2px solid #8b5cf6; padding-left: 8px; margin: 8px 0; }
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.48);
      max-height: 220px;
      overflow: auto;
      padding: 8px;
      margin-bottom: 12px;
    }

    .trace-item {
      border-left: 2px solid rgba(56, 189, 248, 0.45);
      padding: 6px 8px;
      margin: 6px 0;
      background: rgba(15, 23, 42, 0.48);
      border-radius: 6px;
      font-size: 12px;
    }

    .trace-title { color: #bae6fd; font-weight: 700; }
    .trace-body { color: #e2e8f0; margin-top: 3px; line-height: 1.45; }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tab {
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.55);
      color: #dbeafe;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 12px;
      cursor: pointer;
    }

    .tab.active {
      border-color: rgba(103, 232, 249, 0.8);
      background: rgba(8, 47, 73, 0.56);
      color: #cffafe;
    }

    .preview {
      min-height: 240px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: rgba(2, 6, 23, 0.56);
      padding: 12px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 12px;
      color: #e2e8f0;
      overflow: auto;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1 class="title" data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>
      </div>
      <div class="hero-right">
        <div class="status-chip" id="globalStatus">Idle</div>
        <div class="lang-switch">
          <button id="langZh" class="active">中文</button>
          <button id="langEn">EN</button>
        </div>
      </div>
    </div>

    <div class="layout">
      <div class="stack">
        <section class="panel">
          <h2 data-i18n="sourcesTitle"></h2>
          <div class="uploader">
            <button id="pickDirBtn" data-i18n="pickDirBtn"></button>
            <button id="pickFileBtn" data-i18n="pickFileBtn"></button>
            <div class="small" data-i18n="sourceHint"></div>
          </div>
          <input id="dirInput" type="file" webkitdirectory directory multiple hidden />
          <input id="fileInput" type="file" multiple hidden />

          <div class="field" style="margin-top:10px;">
            <label data-i18n="selectedFiles"></label>
            <div class="file-list" id="fileList"></div>
          </div>
        </section>

        <section class="panel">
          <h2 data-i18n="profileTitle"></h2>
          <div class="row">
            <div class="field">
              <label data-i18n="profilePresetLabel"></label>
              <select id="profilePreset">
                <option value="jp-2026-001">jp-2026-001</option>
                <option value="custom">custom</option>
              </select>
            </div>
            <div class="field">
              <label data-i18n="profileImportLabel"></label>
              <input id="profileImport" type="file" accept=".yaml,.yml,.json,.txt" />
            </div>
          </div>

          <div class="field">
            <label data-i18n="targetRoleLabel"></label>
            <input id="targetRole" value="Backend Tech Lead" />
          </div>

          <div class="row">
            <div class="field">
              <label data-i18n="mustHaveLabel"></label>
              <textarea id="mustHave"></textarea>
            </div>
            <div class="field">
              <label data-i18n="keywordsLabel"></label>
              <textarea id="keywords"></textarea>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label data-i18n="domainLabel"></label>
              <input id="businessDomain" value="电商" />
            </div>
            <div class="field">
              <label data-i18n="toneLabel"></label>
              <select id="tone">
                <option value="A" data-i18n="toneA"></option>
                <option value="B" data-i18n="toneB"></option>
              </select>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2 data-i18n="runTitle"></h2>
          <div class="row">
            <div class="field">
              <label data-i18n="runIdLabel"></label>
              <input id="runId" value="20260228030000" />
            </div>
            <div class="field">
              <label data-i18n="outputLabel"></label>
              <input id="outputRoot" value="outputs" />
            </div>
          </div>

          <div class="switch-row">
            <label class="switch"><input id="useLLM" type="checkbox" /> <span data-i18n="useLLM"></span></label>
            <label class="switch"><input id="requireLLM" type="checkbox" /> <span data-i18n="requireLLM"></span></label>
            <label class="switch"><input id="strictGate" type="checkbox" checked /> <span data-i18n="strictGate"></span></label>
          </div>

          <button class="btn" id="runBtn" data-i18n="runBtn"></button>
          <div class="cmd" id="cmdPreview"></div>
        </section>
      </div>

      <div class="stack">
        <section class="panel">
          <h2 data-i18n="processTitle"></h2>
          <div class="trace" id="trace"></div>
        </section>
          <h2 data-i18n="processTitle"></h2>
          <div class="steps" id="steps">
            <div class="step" data-step="extract"><div class="dot">✓</div><div data-i18n="stepExtract"></div><div class="meta">pending</div></div>
            <div class="step" data-step="match"><div class="dot">✓</div><div data-i18n="stepMatch"></div><div class="meta">pending</div></div>
            <div class="step" data-step="gen"><div class="dot">✓</div><div data-i18n="stepGen"></div><div class="meta">pending</div></div>
            <div class="step" data-step="eval"><div class="dot">✓</div><div data-i18n="stepEval"></div><div class="meta">pending</div></div>
          </div>

          <div class="field">
            <label data-i18n="traceLabel"></label>
            <div class="trace" id="trace"></div>
          </div>
        </section>

        <section class="panel">
          <h2 data-i18n="resultTitle"></h2>
          <div class="tabs">
            <button class="tab active" data-tab="match" data-i18n="tabMatch"></button>
            <button class="tab" data-tab="resumeA" data-i18n="tabResumeA"></button>
            <button class="tab" data-tab="resumeB" data-i18n="tabResumeB"></button>
            <button class="tab" data-tab="score" data-i18n="tabScore"></button>
          </div>
          <div class="preview" id="preview"></div>
        </section>
      </div>
    </div>
  </div>

    const state = {
      lang: 'zh',
      files: [],
      outputs: { match: '', resumeA: '', resumeB: '', score: '' }
    };

    const el = {
      langZh: document.getElementById('langZh'),
      langEn: document.getElementById('langEn'),
      status: document.getElementById('globalStatus'),
      pickDirBtn: document.getElementById('pickDirBtn'),

      targetRole: document.getElementById('targetRole'),

      businessDomain: document.getElementById('businessDomain'),

      profilePreset: document.getElementById('profilePreset'),
      cmd: document.getElementById('cmdPreview'),
      trace: document.getElementById('trace'),
      preview: document.getElementById('preview'),
      steps: Array.from(document.querySelectorAll('.step')),
      tabs: Array.from(document.querySelectorAll('.tab'))
    };

    function t(key) {
      return i18n[state.lang][key] || key;
    }

    function setLang(lang) {
      state.lang = lang;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('[data-i18n]').forEach(node => {
        const key = node.getAttribute('data-i18n');
        node.textContent = t(key);
      });
      el.langZh.classList.toggle('active', lang === 'zh');
      el.langEn.classList.toggle('active', lang === 'en');
      if (el.status.textContent === '' || [i18n.zh.statusIdle, i18n.en.statusIdle].includes(el.status.textContent)) {
        el.status.textContent = t('statusIdle');
      }
      renderFiles();
      renderPreview();
      refreshCmd();
      resetStepMeta();
    }

    function resetStepMeta() {}
    function setStep(index, stateName) {}
      el.steps.forEach(step => {
        if (!step.classList.contains('running') && !step.classList.contains('done')) {
          step.querySelector('.meta').textContent = t('pending');
        }
      });
    }

    function fileKey(file) {
      return `${file.name}|${file.size}|${file.webkitRelativePath || ''}`;
    }

    function mergeFiles(fileList) {
      const map = new Map(state.files.map(f => [fileKey(f), f]));
      Array.from(fileList).forEach(file => map.set(fileKey(file), file));
      state.files = Array.from(map.values());
      renderFiles();
      refreshCmd();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function renderFiles() {
      if (!state.files.length) {
        el.fileList.textContent = t('noFiles');
        return;
      }
      const dirs = new Set();
      const extCount = {};
      const html = [];
      state.files.slice(0, 80).forEach(file => {
        const relative = file.webkitRelativePath || file.name;
        const dir = relative.includes('/') ? relative.split('/').slice(0, -1).join('/') : '';
        if (dir) dirs.add(dir);
        const ext = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'noext';
        extCount[ext] = (extCount[ext] || 0) + 1;
        html.push(`<div class="file-item"><span>${relative}</span><span>${formatSize(file.size)}</span></div>`);
      });
      const extSummary = Object.entries(extCount)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 6)
        .map(([ext, count]) => `${ext}:${count}`)
        .join(' | ');
      const head = `${t('fileCount')}: ${state.files.length} · ${t('dirCount')}: ${dirs.size} · ${extSummary}`;
      el.fileList.innerHTML = `<div class="small" style="margin-bottom:6px;">${head}</div>${html.join('')}`;
    }

    function parseProfileText(text) {
      const raw = text.trim();
      if (!raw) return null;
      try {
        const obj = JSON.parse(raw);
        return {
          target_role: obj.target_role || obj.targetRole || '',
          must_have: obj.must_have || obj.mustHave || [],
          keywords: obj.keywords || [],
          business_domain: obj.business_domain || obj.businessDomain || '',
          tone: obj.tone || 'A'
        };
      } catch (_) {}

      const lines = raw.split(/\r?\n/);
      const out = { target_role: '', must_have: [], keywords: [], business_domain: '', tone: 'A' };
      let current = '';
      lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;
        const keyMatch = trimmed.match(/^([a-zA-Z_]+)\s*:\s*(.*)$/);
        if (keyMatch) {
          current = keyMatch[1];
          const value = keyMatch[2].trim();
          if (current === 'target_role') out.target_role = value;
          if (current === 'business_domain') out.business_domain = value;
          if (current === 'tone') out.tone = value || 'A';
          return;
        }
        if (trimmed.startsWith('-')) {
          const value = trimmed.replace(/^-\s*/, '');
          if (current === 'must_have') out.must_have.push(value);
          if (current === 'keywords') out.keywords.push(value);
        }
      });
      return out;
    }

    function applyProfile(profile) {
      if (!profile) return;
      el.targetRole.value = profile.target_role || '';
      el.mustHave.value = (profile.must_have || []).join('\n');
      el.keywords.value = (profile.keywords || []).join('\n');
      el.businessDomain.value = profile.business_domain || '';
      el.tone.value = profile.tone || 'A';
    }

    function getProfile() {
      return {
        id: el.profilePreset.value,
        targetRole: el.targetRole.value.trim(),
        mustHave: el.mustHave.value.split(/\r?\n/).map(v => v.trim()).filter(Boolean),
        keywords: el.keywords.value.split(/\r?\n/).map(v => v.trim()).filter(Boolean),
        domain: el.businessDomain.value.trim(),
        tone: el.tone.value
      };
    }

    function resetSteps() {
      el.steps.forEach(step => {
        step.classList.remove('running', 'done');
        step.querySelector('.meta').textContent = t('pending');
      });
    }

    function setStep(index, stateName) {
      const step = el.steps[index];
      step.classList.remove('running', 'done');
      if (stateName === 'running') {
        step.classList.add('running');
        step.querySelector('.meta').textContent = t('running');
      } else if (stateName === 'done') {
        step.classList.add('done');
        step.querySelector('.meta').textContent = t('done');
      } else {
        step.querySelector('.meta').textContent = t('pending');
      }
    }

    function trace(type, msg) {
      const node = document.createElement('div');
      node.className = `trace-line ${type}`;
      node.textContent = `[${nowTs()}] ${msg}`;
      el.trace.appendChild(node);
      el.trace.scrollTop = el.trace.scrollHeight;
    }
      const node = document.createElement('div');
      node.className = 'trace-item';
      node.innerHTML = `<div class="trace-title">${ts} · ${title}</div><div class="trace-body">${body}</div>`;
      el.trace.appendChild(node);
      el.trace.scrollTop = el.trace.scrollHeight;
    }

    function nowTs() {
      const d = new Date();
      return d.toTimeString().slice(0, 8);
    }

    function activeTab() {
      return el.tabs.find(tab => tab.classList.contains('active')).dataset.tab;
    }

    function renderPreview() {
      const key = activeTab();
      el.preview.textContent = state.outputs[key] || t('waitPreview');
    }

    function refreshCmd() {
      const profile = getProfile();
      const files = state.files.length || '<N>';
      const runId = el.runId.value.trim() || '<run-id>';
      const flags = [el.useLLM.checked ? '--use-llm' : '', el.requireLLM.checked ? '--require-llm' : ''].filter(Boolean).join(' ');
      const cmd = `python tools/run_pipeline.py --raw <${files} files> --job-profile ${profile.id || 'job_profiles/jp-2026-001.yaml'} --run-id ${runId} ${flags}`.trim();
      el.cmd.textContent = `${t('cmdPrefix')}: ${cmd}`;
    }

    function buildOutputs() {
      const p = getProfile();
      const coverage = Math.min(92, Math.max(48, p.keywords.length * 8 + p.mustHave.length * 5));
      const score = Math.min(89, Math.max(60, Math.floor((coverage + (state.files.length > 0 ? 18 : 0)) * 0.8)));
      const topKeywords = p.keywords.slice(0, 4).join(', ') || 'n/a';

      state.outputs.match = `job_profile: ${p.id}\nscore_total: ${score}\n\nK: ${Math.floor(coverage * 0.25)}/25\nD: 11/15\nS: 12/15\nQ: 14/20\nE: 13/15\nR: 8/10\n\nTop Keywords: ${topKeywords}\nGaps: SLA, cross-team ownership`;

      state.outputs.resumeA = `# Resume Version A\nTarget: ${p.targetRole || 'Backend Tech Lead'}\nTone: Architecture/Depth\n\n- High-concurrency architecture optimization\n- Reliability governance with evidence traceability\n- Quantified outcomes anchored to artifacts`; 

      state.outputs.resumeB = `# Resume Version B\nTarget: ${p.targetRole || 'Backend Tech Lead'}\nTone: Delivery/Owner\n\n- Cross-team execution and risk control\n- Governance and rollback discipline\n- Result-oriented storytelling with measurable impact`;

      state.outputs.score = `# Scorecard\nTotal: ${Math.floor(score * 0.9)}/100\nKeyword Coverage: ${coverage}%\nQuantified Bullets: 56%\nEvidence Citation: 64%\n\nActions:\n1. Fill missing SLA/SLO terms\n2. Add cross-team ownership evidence\n3. Increase measurable outcomes in summary`;
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runPipeline() {
      el.runBtn.disabled = true;
      el.trace.innerHTML = '';
      el.status.textContent = t('statusRunning');

      if (el.requireLLM.checked && !el.useLLM.checked) {
        el.status.textContent = t('statusBlocked');
        trace('error', t('logBlocked'));
        el.runBtn.disabled = false;
        return;
      }

      const profile = getProfile();
      const fileCount = state.files.length || 1;
      const score = Math.min(89, Math.max(60, Math.floor((profile.keywords.length * 8 + profile.mustHave.length * 5 + (fileCount > 0 ? 18 : 0)) * 0.8)));

      trace('system', t('logStart'));
      await delay(400);

      trace('action', t('logExtracting'));
      trace('thought', t('thoughtExtract').replace('{0}', fileCount));
      await delay(800);
      trace('success', t('logExtractDone').replace('{0}', Math.min(3, fileCount + 1)));
      await delay(300);

      trace('action', t('logMatching'));
      trace('thought', t('thoughtMatch').replace('{0}', profile.id || 'custom').replace('{1}', profile.tone));
      await delay(800);
      trace('success', t('logMatchDone').replace('{0}', score));
      await delay(300);

      trace('action', t('logGenerating'));
      trace('thought', t('thoughtGen'));
      await delay(800);
      trace('success', t('logGenDone'));
      await delay(300);

      trace('action', t('logEvaluating'));
      trace('thought', t('thoughtEval'));
      await delay(800);
      trace('success', t('logEvalDone'));
      await delay(300);

      trace('system', t('logPipelineDone'));

      buildOutputs();
      renderPreview();
      el.status.textContent = t('statusDone');
      el.runBtn.disabled = false;
    }
      el.runBtn.disabled = true;
      resetSteps();
      el.trace.innerHTML = '';
      el.status.textContent = t('statusRunning');

      if (el.requireLLM.checked && !el.useLLM.checked) {
        el.status.textContent = t('statusBlocked');
        trace(nowTs(), 'Validation', t('traceBlocked'));
        el.runBtn.disabled = false;
        return;
      }

      const profile = getProfile();
      const llmMode = el.useLLM.checked ? 'on' : 'off';
      const strictMode = el.requireLLM.checked ? 'on' : 'off';

      const tracePlan = [
        { step: 0, title: 'Extract', body: `Collecting ${state.files.length} files from selected sources, normalizing into evidence candidates.` },
        { step: 1, title: 'Match', body: `Scoring against profile ${profile.id} with tone=${profile.tone}, llm=${llmMode}, strict=${strictMode}.` },
        { step: 2, title: 'Generate', body: 'Assembling A/B resumes from top cards with fact-locked template fields.' },
        { step: 3, title: 'Evaluate', body: 'Computing rule scorecard and preparing explainable improvement actions.' }
      ];

      for (const item of tracePlan) {
        setStep(item.step, 'running');
        trace(nowTs(), item.title, item.body);
        await delay(650);
        setStep(item.step, 'done');
      }

      buildOutputs();
      renderPreview();
      el.status.textContent = t('statusDone');
      el.runBtn.disabled = false;
    }

    el.pickDirBtn.addEventListener('click', () => el.dirInput.click());
    el.pickFileBtn.addEventListener('click', () => el.fileInput.click());
    el.dirInput.addEventListener('change', () => mergeFiles(el.dirInput.files));
    el.fileInput.addEventListener('change', () => mergeFiles(el.fileInput.files));

    el.profileImport.addEventListener('change', async () => {
      const file = el.profileImport.files && el.profileImport.files[0];
      if (!file) return;
      const text = await file.text();
      const parsed = parseProfileText(text);
      applyProfile(parsed);
      refreshCmd();
    });

    ['input', 'change'].forEach(evt => {
      [el.runId, el.outputRoot, el.targetRole, el.mustHave, el.keywords, el.businessDomain, el.tone, el.profilePreset].forEach(node => {
        node.addEventListener(evt, refreshCmd);
      });
    });

    el.useLLM.addEventListener('change', () => {
      if (!el.useLLM.checked) el.requireLLM.checked = false;
      refreshCmd();
    });

    el.requireLLM.addEventListener('change', () => {
      if (el.requireLLM.checked) el.useLLM.checked = true;
      refreshCmd();
    });

    el.tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        el.tabs.forEach(tn => tn.classList.remove('active'));
        tab.classList.add('active');
        renderPreview();
      });
    });

    el.runBtn.addEventListener('click', runPipeline);
    el.langZh.addEventListener('click', () => setLang('zh'));
    el.langEn.addEventListener('click', () => setLang('en'));

    applyProfile({
      target_role: 'Backend Tech Lead',
      must_have: ['高并发系统设计', '稳定性治理', '跨团队协作'],
      keywords: ['Java', 'Redis', 'Kafka', 'SLA', 'SLO'],
      business_domain: '电商',
      tone: 'A'
    });

    setLang('zh');
    resetStepMeta();
    renderFiles();
    renderPreview();
    refreshCmd();
  </script>
</body>
</html>
