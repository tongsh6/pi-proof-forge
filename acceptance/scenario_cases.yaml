    input_requirements:
      channel:
        required: true
        P0_supported:
          - "liepin"
        unsupported_result: "unsupported_submission_channel"
      job_lead:
        required: true
        channel_must_match_selected_channel: true
        source: "saved_validated_job_lead"
        required_fields:
          - "job_url"
          - "company_or_role_label"
          - "channel"
