  - case_id: "agent_run_guided_batch"
    status: "ready_for_implementation"
    priority: "P0"
    persona: "solo_technical_job_seeker"
    entry_point: "agent_run"
    depends_on:
      - "first_launch_configure_lm_studio"
      - "quick_run_generate_and_evaluate_resume"
      - "setup_job_target"
    user_goal: >
      用户选择一个已完成的岗位目标、一组候选 Job Leads 和运行策略，
      让 Agent Run 执行受控批次：为多个候选岗位完成发现/读取、匹配、
      简历定位、生成、评测、门禁和人工确认前的投递计划；
      用户能逐个查看候选决策、失败原因、生成产物和下一步建议，
      且系统默认不触发真实外部投递。

    scope:
      includes:
        - "select_active_job_profile"
        - "select_candidate_job_leads"
        - "select_or_enter_resume_positioning_policy"
        - "configure_batch_limits"
        - "require_saved_llm_provider"
        - "run_multi_candidate_agent_loop"
        - "llm_final_matching_per_candidate"
        - "resume_pdf_generation_per_passed_candidate"
        - "evaluation_and_gate_per_candidate"
        - "candidate_decision_table"
        - "agent_run_event_log"
        - "delivery_plan_without_real_submit"
      excludes:
        - "unattended_real_submit"
        - "external_platform_check_mode"
        - "real_job_board_interaction"
        - "browser_automation"
        - "submission_channel_invocation"
        - "live_external_page_fetch"
        - "feedback_iteration"
        - "interview_feedback_collection"
        - "automatic_policy_relaxation"

    input_requirements:
      active_job_profile:
        required: true
        status_required: "saved_complete"
        missing_result: "missing_active_job_profile"
      candidate_job_leads:
        required: true
        minimum_count: 1
        source: "existing_saved_or_fixture_job_leads"
        required_fields:
          - "job_url_or_source_reference"
          - "company_or_role_label"
        missing_result: "missing_candidate_job_leads"
      provider_config:
        required: true
        source: "saved_lm_studio_settings"
        missing_result: "missing_provider_config"
      policy_limits:
        required: true
        defaults_allowed: true
        user_editable: true
        editable_fields:
          - "max_candidates"
          - "max_passed_candidates"
          - "max_generated_resumes"
        locked_fields:
          submit_enabled:
            value: false
            reason: "real_submit_is_out_of_scope_for_case_6"
            enable_attempt_result: "submit_enable_blocked_for_case"
        defaults:
          max_candidates: 5
          max_passed_candidates: 3
          max_generated_resumes: 3
          submit_enabled: false
        fields:
          - "max_candidates"
          - "max_passed_candidates"
          - "max_generated_resumes"
          - "submit_enabled"

    run_policy:
      mode: "guided_batch_agent_run"
      require_llm: true
      preflight_confirmation_required: true
      submit_enabled_default: false
      submit_enabled_locked_false: true
      submit_enable_attempt_blocked: true
      real_submit_forbidden_in_case: true
      no_external_delivery: true
      no_browser_automation: true
      no_submission_channel_invocation: true
      no_live_external_page_fetch: true
      no_silent_mock_outputs: true
      no_rule_final_matching_output: true
      no_template_only_generation: true
      batch_limits_required: true
      batch_limits_user_editable: true
      effective_policy_limits_recorded: true
      run_record_required: true

    preflight_confirmation_policy:
      required: true
      user_must_confirm:
        - "llm_provider_required_and_may_be_used_multiple_times"
        - "effective_batch_limits"
        - "no_real_submit_or_external_platform_interaction"
      start_blocked_until_confirmed: true
      confirmation_recorded_in_run_log: true
      confirmation_fields:
        - "confirmed_at"
        - "confirmed_by_user"
        - "confirmed_policy_limits"
        - "confirmed_no_real_submit"

    llm_policy:
      required: true
      provider: "lm_studio"
      use_saved_provider_config: true
      unavailable_result: "BLOCKED_LOCAL_PROVIDER"
      affected_stages:
        - "candidate_analysis"
        - "matching"
        - "generation"
        - "evaluation"
        - "delivery_plan_reasoning"

    resume_positioning_policy:
      source: "user_selected_or_custom_positioning"
      may_reuse_quick_run_positioning: true
      per_candidate_override_allowed: true
      agent_may_recommend_per_candidate_positioning: true
      recommendation_must_stay_within_user_policy: true
      positioning_reason_required_per_candidate: true
      no_hardcoded_ab_variants: true
      selected_positioning_recorded_per_candidate: true

    candidate_selection_policy:
      default_order: "user_selected_order"
      agent_may_rank_candidates: true
      llm_required_for_agent_ranking: true
      deterministic_preprocessing_allowed: true
      user_can_pin_or_exclude_candidates_before_run: true
      pinned_candidates_keep_priority: true
      excluded_candidates_never_run: true
      agent_ranking_reason_required: true
      final_candidate_order_recorded: true
      no_candidate_added_outside_user_selected_scope: true
      selected_candidate_ids_recorded_in_run_log: true

    gate_policy:
      matching_decision_required_for_all_candidates: true
      generation_threshold_required: true
      candidates_below_generation_threshold_do_not_generate_resume: true
      scorecard_required_only_after_resume_generation: true
      requires_matching_threshold: true
      requires_evaluation_threshold: true
      failed_gate_candidates_not_in_delivery_plan: true
      gate_reasons_visible: true
      user_review_required_before_any_future_external_delivery: true

    stage_outputs:
      agent_run:
        required_artifact: "agent_run_log"
        required_fields:
          - "run_id"
          - "stage_events"
          - "selected_candidate_ids"
          - "policy_limits"
          - "preflight_confirmation"
      candidate_decisions:
        required_artifact: "candidate_decision_table"
        required_fields:
          - "candidate_id"
          - "job_lead_id"
          - "final_rank"
          - "status"
          - "matching_total"
          - "matching_summary"
          - "evaluation_total"
          - "gate_decision"
          - "reason"
          - "ranking_reason"
          - "selected_positioning"
          - "positioning_reason"
      generated_outputs:
        required_artifacts:
          - "matching_decision_summary"
          - "matching_report"
          - "resume_output"
          - "resume_pdf"
          - "scorecard"
        matching_decision_required_for: "each_selected_candidate"
        resume_pdf_scorecard_required_for: "each_candidate_meeting_generation_threshold"
      delivery_plan:
        required_artifact: "delivery_plan"
        required_fields:
          - "candidate_id"
          - "resume_version_id"
          - "pdf_path"
          - "recommended_channel"
          - "submit_status"

    run_statuses:
      - "ready_to_run"
      - "blocked_missing_inputs"
      - "blocked_local_provider"
      - "running"
      - "completed"
      - "completed_with_blocked_candidates"
      - "failed"

    partial_success_policy:
      allowed: true
      candidate_level_blocked_does_not_fail_run: true
      completed_with_blocked_candidates_when:
        - "at_least_one_candidate_completes"
        - "one_or_more_candidates_blocked_or_failed_gate"
      whole_run_blocked_when:
        - "missing_required_inputs"
        - "lm_studio_unavailable_before_run"
        - "provider_config_missing"
      whole_run_failed_when:
        - "run_log_cannot_be_persisted"
        - "unexpected_system_exception"
        - "no_candidate_reaches_any_recordable_decision_due_to_system_error"
      candidate_blocked_reasons:
        - "low_matching_score"
        - "below_generation_threshold"
        - "llm_output_invalid_for_candidate"
        - "insufficient_evidence_for_candidate"
        - "gate_failed"
      blocked_candidate_reasons_recorded: true

    user_actions:
      - "open_app"
      - "navigate_to_agent_run"
      - "inspect_saved_provider_summary"
      - "select_complete_job_profile"
      - "select_candidate_job_leads"
      - "pin_or_exclude_candidates_if_needed"
      - "select_or_enter_resume_positioning_policy"
      - "review_batch_limits"
