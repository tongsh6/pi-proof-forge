  - case_id: "submission_check_mode"
    status: "ready_for_implementation"
    priority: "P0"
    persona: "solo_technical_job_seeker"
    entry_point: "submissions"
    depends_on:
      - "agent_run_guided_batch"
      - "channel_session_setup"
    user_goal: >
      用户选择一个受支持渠道的已验证 Job Lead 和一个已生成的 PDF 简历版本，
      在 Submissions 中执行 check-mode 投递演练，验证渠道登录态、目标职位、
      渠道特定目标匹配、发简历路径和安全门禁；
      系统必须记录完整步骤、截图/日志路径和结构化阻断原因，
      并且无论页面状态如何都不得点击最终确认发送。

    scope:
      includes:
        - "select_submission_channel"
        - "select_channel_job_lead"
        - "select_resume_pdf_version"
        - "use_channel_shared_session"
        - "run_check_mode_only"
        - "apply_submission_rate_limit"
        - "login_check"
        - "target_verify"
        - "channel_specific_target_safety_check"
        - "channel_specific_send_resume_path_check"
        - "safe_resume_attachment_check_when_supported"
        - "submit_skipped_assertion"
        - "submission_step_log"
        - "submission_detail_paths"
      excludes:
        - "final_submit"
        - "bulk_submission"
