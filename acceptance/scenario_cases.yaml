      channel_specific_safety_fields_required_when_available: true
      liepin:
        verify_job_id_when_available: true
        verify_recruiter_when_available: true
        main_job_button_only: true
        recommendation_area_allowed_only_for_controlled_recovery: true
      target_mismatch_result: "target_mismatch"
      job_unavailable_result: "job_page_unavailable"
      login_required_result: "login_required"
      rate_limited_result: "rate_limited"
