        - "attachment_check_or_structured_not_supported"
        - "submit_skipped"

    check_mode_policy:
      required: true
      submit_enabled: false
      final_confirm_click_forbidden: true
      must_record_submit_skipped: true
      no_real_submit_even_when_all_checks_pass: true
      no_auto_retry_after_blocked_result: true
      may_attach_resume_before_final_confirm_when_safe: true
      stop_before_final_confirm_required: true
