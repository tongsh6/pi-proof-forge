      contract_shape: "multi_channel_extensible"
      P0_supported_adapters:
        liepin:
          browser_channel: "liepin"
          target_safety_fields:
            - "job_id"
            - "recruiter"
          send_resume_path: "chat_send_resume"
          final_submit_control: "confirm_send_button"
      adapter_must_report_capabilities: true
      unsupported_adapter_result: "unsupported_submission_channel"
      liepin_only_contract_forbidden: true
      channel_required_in_api_ui_logs: true
      adapter_specific_fields_must_be_namespaced_by_channel: true
